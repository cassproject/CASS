version: '3'
services:
  standalone-branch:
    build:
      context: .
      dockerfile: docker/standalone/Dockerfile
      args:
        - BRANCH=${BRANCH:-1.6}
        - VERSION=${VERSION:-1.6.xx}
      platforms:
        - "linux/amd64"
        - "linux/arm64"
    image: cassproject/cass:${branch}
  standalone-version:
    build:
      context: .
      dockerfile: docker/standalone/Dockerfile
      args:
        - BRANCH=${BRANCH:-1.6}
        - VERSION=${VERSION:-1.6.xx}
      platforms:
        - "linux/amd64"
        - "linux/arm64"
    image: cassproject/cass:${version}
  node-branch:
    build:
      context: .
      dockerfile: docker/standalone/node/Dockerfile
      args:
        - BRANCH=${BRANCH:-1.6}
        - VERSION=${VERSION:-1.6.xx}
      platforms:
        - "linux/amd64"
        - "linux/arm64"
    image: cassproject/cass:node-${branch}
  node-version:
    build:
      context: .
      dockerfile: docker/standalone/node/Dockerfile
      args:
        - BRANCH=${BRANCH:-1.6}
        - VERSION=${VERSION:-1.6.xx}
      platforms:
        - "linux/amd64"
        - "linux/arm64"
    image: cassproject/cass:node-${version}
  alpine-branch:
    build:
      context: .
      dockerfile: docker/standalone/node/DockerfileAlpine
      args:
        - BRANCH=${BRANCH:-1.6}
        - VERSION=${VERSION:-1.6.xx}
      platforms:
        - "linux/amd64"
        - "linux/arm64"
    image: cassproject/cass:node-${branch}-alpine
  alpine-version:
    build:
      context: .
      dockerfile: docker/standalone/node/DockerfileAlpine
      args:
        - BRANCH=${BRANCH:-1.6}
        - VERSION=${VERSION:-1.6.xx}
      platforms:
        - "linux/amd64"
        - "linux/arm64"
    image: cassproject/cass:node-${version}-alpine
  distroless-branch:
    build:
      context: .
      dockerfile: docker/standalone/node/DockerfileDistroless
      args:
        - BRANCH=${BRANCH:-1.6}
        - VERSION=${VERSION:-1.6.xx}
      platforms:
        - "linux/amd64"
        - "linux/arm64"
    image: cassproject/cass:node-${branch}-distroless
  distroless-version:
    build:
      context: .
      dockerfile: docker/standalone/node/DockerfileDistroless
      args:
        - BRANCH=${BRANCH:-1.6}
        - VERSION=${VERSION:-1.6.xx}
      platforms:
        - "linux/amd64"
        - "linux/arm64"
    image: cassproject/cass:node-${version}-distroless