name: Publish Release

on:
  pull_request:
    types:
      - closed
    branches:
      - "1.5"
      - "1.6"

jobs:
  publish-release:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.title, 'Release:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get Version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Images via Docker Compose
        env:
          branch: ${{ github.base_ref }}
          version: ${{ env.version }}
        run: docker compose -f docker-compose-release.yml build --sbom=true --provenance=true --push

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.version }}
          name: Release ${{ env.version }}
          body: ${{ github.event.pull_request.body }}
          draft: false
          prerelease: false
