name: Draft Release PR

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (major, minor, patch, prerelease)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      branch:
        description: 'Branch to release to'
        required: true
        default: '1.6'
        type: choice
        options:
          - 1.5
          - 1.6

jobs:
  draft-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config --global user.name "Cass Project"
          git config --global user.email "cass@eduworks.com"

      - name: Prepare Release Branch
        id: branch
        run: |
          BRANCH_NAME="release/draft-${{ github.event.inputs.branch }}-$(date +%s)"
          git checkout -b $BRANCH_NAME
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Upgrade Dependencies
        run: |
          npm upgrade --save
          # Discard the package.json if it was just formatting
          git diff --exit-code package.json || npm install

      - name: Bump Version
        id: version
        run: |
          NEW_VERSION=$(npm --no-git-tag-version version ${{ github.event.inputs.version_bump }})
          echo "new_version=$NEW_VERSION" >> $GITHUB_ENV
          
          # Update swagger.json version
          jq ".info.version = \"${NEW_VERSION#v}\"" src/main/swagger.json > src/main/swagger.tmp.json
          mv src/main/swagger.tmp.json src/main/swagger.json

      - name: Update Submodules
        run: |
          git submodule update --remote src/main/webapp

      - name: Update Changelog (Basic)
        run: |
          echo -e "## Release ${{ env.new_version }}\n\n$(git log $(git describe --tags --abbrev=0)..HEAD --oneline)\n\n$(cat CHANGELOG.md)" > CHANGELOG.md

      - name: Commit Changes
        run: |
          git add package.json package-lock.json src/main/swagger.json src/main/webapp CHANGELOG.md
          git commit -m "chore(release): bump version to ${{ env.new_version }} & upgrade dependencies" || echo "No changes to commit"
          git push origin ${{ env.branch_name }}

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Release: ${{ env.new_version }}" \
            --body "Automated release PR bumping the version and generating dependency updates. Review the changes and merge this PR into the major/minor target branch when you are ready to publish the Docker images." \
            --base ${{ github.event.inputs.branch }} \
            --head ${{ env.branch_name }}