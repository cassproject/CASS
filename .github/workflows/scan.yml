name: Image Vulnerability Scan

on:
  pull_request:
    branches:
      - "1.5"
      - "1.6"

jobs:
  scan-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Elasticsearch
        run: docker compose -f docker-compose-test.yml up -d elasticsearch-cass

      - name: Build Images via Docker Compose
        run: docker compose -f docker-compose-test.yml build --no-cache

      - name: Docker Scout CVE Scan (Node)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: cass-cass
          only-severities: critical,high
          write-comment: true

      - name: Docker Scout CVE Scan (Alpine)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: cass-cass-alpine
          only-severities: critical,high
          write-comment: true

      - name: Docker Scout CVE Scan (Distroless)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: cass-cass-distroless
          only-severities: critical,high
          write-comment: true

      - name: Docker Scout CVE Scan (Standalone)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: cass-cass-standalone
          only-severities: critical,high
          write-comment: true
